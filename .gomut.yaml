target:
  mode: package
  value: ./sample/...
kind:
  mode: standard
type:
  - killed
  - lived
  - not-covered
  - timed-out
  - not-viable
exclude:
  - db
  - sample
  - alpha
# enable:
#   - bitwise_operator
# disable:
#   - return
progress: on
# parallel: 4
jsonl: mutations.jsonl
html: report.html
sarif: report.sarif
# baseline:
#   input: baseline-in.jsonl
#   output: baseline-out.jsonl
isolation:
  copy_exclude:
    - .codex
    - .claude
    - .worktrees
    - docs
    - internal/cache/**
    - mutations.jsonl
    - report.html
    - report.sarif
    - tmp
